[project]
name = "econ-project"
r_version = "4.5"

repositories = [
  { alias = "PPM", url = "https://packagemanager.posit.co/cran/latest/bin/linux/jammy-x86_64/4.5" },
]


dependencies = [
  # ========= Data handling =========
  "data.table",
  "dplyr",
  "tidyr",
  "readr",
  "stringr",
  "lubridate",
  "janitor",
  "haven",
  "readxl",

  # ========= Core econometrics =========
  "fixest",
  "ivreg",
  "plm",
  "lmtest",
  "sandwich",
  "clubSandwich",
  "marginaleffects",
  "modelsummary",
  "broom",

  # ========= Causal inference =========
  "did",
  "DRDID",
  "did2s",
  "rdrobust",
  "rddensity",
  "MatchIt",
  "cobalt",

  # ========= Visualization / reporting =========
  "ggplot2",
  "scales",
  "patchwork",
]
